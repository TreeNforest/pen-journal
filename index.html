    --paper: #F6F1E7;
    --paper-raised: #FDFBF6;

    --wishlist-bg: #F1EAD9;

    --radius: 14px;
  }
  html.dark {
    --paper: #171512;
    --paper-raised: #211E1A;
    --line: #35302A;
    --ink: #EDE6D6;
    --ink-soft: #A79E8E;
    --vermilion: #E3705C;
    --cobalt: #6FA0D4;
    --ochre: #D9A94A;

    margin: 0;

    font-family: 'Inter', sans-serif;

  }

  .mono { font-family: 'IBM Plex Mono', monospace; }

  #root { min-height: 100vh; }

  .topbar {

  .topbar h1 {
    margin: 0; font-size: 22px; font-weight: 600; letter-spacing: 0.2px;
    flex: 1;
  }
  .icon-btn {
    display: flex; align-items: center; justify-content: center;
    width: 38px; height: 38px; border-radius: 10px;

  }
  .chip {
    flex-shrink: 0;
    padding: 7px 13px; border-radius: 999px;
    border: 1px solid var(--line); background: var(--paper-raised);
    color: var(--ink-soft); font-size: 13px; cursor: pointer;
    white-space: nowrap;
  }
  .chip.active { background: var(--ink); color: var(--paper); border-color: var(--ink); }

  .layout { display: flex; }

  .drawer-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.35); z-index: 29;
  }
  .drawer {
    position: fixed; top: 0; left: 0; bottom: 0; width: 78vw; max-width: 300px;
    background: var(--paper); border-right: 1px solid var(--line);

  .drawer-header {

  .cat-add-row {

    padding: 8px 10px; margin-top: 6px; border-radius: 10px;
    color: var(--ink-soft); font-size: 13.5px; cursor: pointer;
    border: 1px dashed var(--line);
  }

  .main { flex: 1; min-width: 0; padding: 16px; padding-bottom: 100px; }

  .grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
    gap: 12px;
  }
  .item-card {
    position: relative;
    background: var(--paper-raised);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 14px 14px 12px 18px;
    cursor: pointer;
    overflow: hidden;
  }
  .item-card.wishlist { background: var(--wishlist-bg); border-style: dashed; }
  .ink-stripe {
    position: absolute; left: 0; top: 0; bottom: 0; width: 6px;
  }
  .item-name { font-weight: 600; font-size: 15px; margin: 0 0 4px; line-height: 1.3; }
  .item-meta { font-size: 12px; color: var(--ink-soft); margin: 0; }
  .item-meta.mono { margin-top: 6px; font-size: 11.5px; }

  .empty-state {

  .fab {
    position: fixed; right: 18px; bottom: 24px; z-index: 15;
    width: 56px; height: 56px; border-radius: 50%;
    background: var(--ink); color: var(--paper);
    border: none; font-size: 26px; cursor: pointer;
    box-shadow: 0 6px 18px rgba(0,0,0,0.25);
    display: flex; align-items: center; justify-content: center;

  .fab:active { transform: scale(0.94); }

  .modal-overlay {
    position: fixed; inset: 0; background: rgba(20,18,15,0.45);

  }
  .modal {

    background: var(--paper); border-radius: 20px 20px 0 0;

  @media (min-width: 640px) {
    .modal-overlay { align-items: center; }
    .modal { border-radius: 18px; max-height: 80vh; }
  }
  .modal h2 { margin: 0 0 16px; font-size: 19px; }
  .field { margin-bottom: 14px; }
  .field label {
    display: block; font-size: 12.5px; color: var(--ink-soft); margin-bottom: 5px;
    font-weight: 500;
  }
  .field input[type=text], .field input[type=number], .field input[type=date],
  .field select, .field textarea {
    width: 100%; padding: 10px 12px; border-radius: 10px;
    border: 1px solid var(--line); background: var(--paper-raised); color: var(--ink);
    font-family: inherit; font-size: 14.5px;
  }
  .field textarea { resize: vertical; min-height: 60px; }
  .color-row { display: flex; align-items: center; gap: 10px; }
  .color-row input[type=color] {
    width: 44px; height: 40px; border-radius: 10px; border: 1px solid var(--line);
    padding: 2px; background: var(--paper-raised);
  }
  .status-toggle { display: flex; gap: 8px; }
  .status-toggle button {
    flex: 1; padding: 10px; border-radius: 10px; border: 1px solid var(--line);
    background: var(--paper-raised); color: var(--ink-soft); font-size: 13.5px; cursor: pointer;
  }
  .status-toggle button.active { background: var(--ink); color: var(--paper); border-color: var(--ink); }

  .modal-actions { display: flex; gap: 10px; margin-top: 18px; }
  .btn {
    flex: 1; padding: 12px; border-radius: 10px; border: none;
    font-size: 14.5px; font-weight: 600; cursor: pointer;
  }
  .btn-primary { background: var(--ink); color: var(--paper); }
  .btn-ghost { background: transparent; color: var(--ink-soft); border: 1px solid var(--line); }
  .btn-danger { background: transparent; color: var(--vermilion); border: 1px solid var(--vermilion); }

  ::-webkit-scrollbar { width: 0; height: 0; }
</style>

<script type="text/babel" data-type="module">
import React, { useState, useEffect, useMemo, useCallback } from 'react';
import { createRoot } from 'react-dom/client';
import { initializeApp } from 'firebase/app';
import {
  getFirestore, collection, doc, onSnapshot, addDoc, updateDoc, deleteDoc,
  setDoc, getDoc, serverTimestamp, query, orderBy
} from 'firebase/firestore';

// ---- Firebase config: 請換成你自己在 Firebase console 建立的新專案設定 ----
const firebaseConfig = {
  apiKey: "AIzaSyCyREDMu5Ej0uPAEvKcoYmL48c_9n_ygzs",
  authDomain: "pen-journal.firebaseapp.com",
  projectId: "pen-journal",
  storageBucket: "pen-journal.firebasestorage.app",
  messagingSenderId: "728609195590",
  appId: "1:728609195590:web:4331c189676d153f2dac47"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

function flattenTree(categories, parentId = null, depth = 0) {
  const children = categories
    .filter(c => (c.parentId || null) === parentId)
    .sort((a, b) => (a.order ?? 0) - (b.order ?? 0));
  let out = [];
  for (const c of children) {
    out.push({ ...c, depth });
    out = out.concat(flattenTree(categories, c.id, depth + 1));
  }
  return out;
}

function collectDescendantIds(categories, rootId) {
  const ids = [rootId];
  const children = categories.filter(c => c.parentId === rootId);
  for (const c of children) ids.push(...collectDescendantIds(categories, c.id));
  return ids;
}

function CategoryNode({ cat, categories, itemCounts, selectedId, onSelect, onOpenActions, depth = 0 }) {
  const children = categories
    .filter(c => c.parentId === cat.id)
    .sort((a, b) => (a.order ?? 0) - (b.order ?? 0));
  const count = itemCounts[cat.id] || 0;
  return (
    <div className="cat-node">
      <div
        className={"cat-row" + (selectedId === cat.id ? " selected" : "")}
        onClick={() => onSelect(cat.id)}
      >
        <span className="cat-swatch" style={{ background: cat.color || '#B9A98A' }}></span>
        <span className="cat-name">{cat.name}</span>
        {count > 0 && <span className="cat-count">{count}</span>}
        <span className="cat-more-btn" onClick={(e) => { e.stopPropagation(); onOpenActions(cat); }}>⋯</span>
      </div>
      {children.length > 0 && (
        <div className="cat-children">
          {children.map(child => (
            <CategoryNode key={child.id} cat={child} categories={categories}
              itemCounts={itemCounts} selectedId={selectedId} onSelect={onSelect}
              onOpenActions={onOpenActions} depth={depth + 1} />
          ))}
        </div>
      )}
    </div>
  );
}

function CategoryForm({ category, initialParentId, categories, onSave, onDelete, onClose }) {
  const [name, setName] = useState(category?.name || '');
  const [parentId, setParentId] = useState(category ? (category.parentId || null) : (initialParentId || null));
  const [color, setColor] = useState(category?.color || '#B9A98A');
  const excludeIds = category ? new Set(collectDescendantIds(categories, category.id)) : new Set();
  const flat = flattenTree(categories).filter(c => !excludeIds.has(c.id));

  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal" onClick={e => e.stopPropagation()}>
        <h2 className="display">{category ? '編輯分類' : '新增分類'}</h2>
        <div className="field">
          <label>分類名稱</label>
          <input type="text" value={name} onChange={e => setName(e.target.value)} placeholder="例如：色鉛筆" />
        </div>
        <div className="field">
          <label>上層分類</label>
          <select value={parentId || ''} onChange={e => setParentId(e.target.value || null)}>
            <option value="">（頂層分類）</option>
            {flat.map(c => (
              <option key={c.id} value={c.id}>{'　'.repeat(c.depth)}{c.name}</option>
            ))}
          </select>
        </div>
        <div className="field">
          <label>標籤色</label>
          <div className="color-row">
            <input type="color" value={color} onChange={e => setColor(e.target.value)} />
          </div>
        </div>
        <div className="modal-actions">
          {category && <button className="btn btn-danger" onClick={() => onDelete(category)}>刪除</button>}
          <button className="btn btn-ghost" onClick={onClose}>取消</button>
          <button className="btn btn-primary" disabled={!name.trim()}
            onClick={() => { onSave({ id: category?.id, name: name.trim(), parentId, color }); }}>
            儲存
          </button>
        </div>
      </div>
    </div>
  );
}

function ItemForm({ item, categories, onSave, onDelete, onClose }) {
  const flat = flattenTree(categories);
  const [form, setForm] = useState(item ? { ...item, categoryId: item.categoryId || '', writeColorHex: item.writeColorHex || item.colorHex || '#C1432E' } : {
    name: '', categoryId: '', brand: '', colorHex: '#C1432E', writeColorHex: '#C1432E',
    purchaseDate: '', price: '', store: '', notes: '',
    status: 'owned', isSet: false
  });
  const set = (k, v) => setForm(f => ({ ...f, [k]: v }));

  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal" onClick={e => e.stopPropagation()}>
        <h2 className="display">{item ? '編輯項目' : '新增項目'}</h2>

        <div className="field">
          <label>狀態</label>
          <div className="status-toggle">
            <button className={form.status === 'owned' ? 'active' : ''} onClick={() => set('status', 'owned')}>已收藏</button>
            <button className={form.status === 'wishlist' ? 'active' : ''} onClick={() => set('status', 'wishlist')}>願望清單</button>
          </div>
        </div>

        <div className="field">
          <label>類型</label>
          <div className="status-toggle">
            <button className={!form.isSet ? 'active' : ''} onClick={() => set('isSet', false)}>單一項目</button>
            <button className={form.isSet ? 'active' : ''} onClick={() => set('isSet', true)}>整組／色盒</button>
          </div>
          {form.isSet && (
            <div style={{ fontSize: 12, color: 'var(--ink-soft)', marginTop: 6 }}>
              例如 72 色鉛筆盒。存檔後點卡片會進到盒子內部，管理裡面每一支顏色。
            </div>
          )}
        </div>

        <div className="field">
          <label>名稱</label>
          <input type="text" value={form.name} onChange={e => set('name', e.target.value)} placeholder="例如：Uni Jetstream 0.5 黑" />
        </div>

        <div className="field">
          <label>{form.isSet ? '代表色（卡片上會顯示這個顏色）' : '外殼／筆身顏色（卡片墨色條會用這個顏色）'}</label>
          <div className="color-row">
            <input type="color" value={form.colorHex} onChange={e => set('colorHex', e.target.value)} />
          </div>
        </div>

        {!form.isSet && (
          <div className="field">
            <label>使用色（實際畫/寫出來的顏色，顏色總覽會依這個排序）</label>
            <div className="color-row">
              <input type="color" value={form.writeColorHex} onChange={e => set('writeColorHex', e.target.value)} />
              <span style={{ fontSize: 12, color: 'var(--ink-soft)' }}>跟外殼不同色才需要改</span>
            </div>
          </div>
        )}

        <div className="field">
          <label>分類</label>
          <select value={form.categoryId} onChange={e => set('categoryId', e.target.value)}>
            <option value="">（未分類）</option>
            {flat.map(c => (
              <option key={c.id} value={c.id}>{'　'.repeat(c.depth)}{c.name}</option>
            ))}
          </select>
          {flat.length === 0 && (
            <div style={{ fontSize: 12, color: 'var(--ink-soft)', marginTop: 4 }}>
              還沒有分類，可以先存這筆，之後再從左上角選單新增分類並回來指定
            </div>
          )}
        </div>

        <div className="field">
          <label>品牌</label>
          <input type="text" value={form.brand} onChange={e => set('brand', e.target.value)} placeholder="例如：Uni、Zebra、Tombow" />
        </div>

        <div className="field">
          <label>{form.status === 'wishlist' ? '預計價格' : '購入日期 / 價格'}</label>
          <div style={{ display: 'flex', gap: 8 }}>
            {form.status === 'owned' && (
              <input type="date" value={form.purchaseDate} onChange={e => set('purchaseDate', e.target.value)} style={{ flex: 1 }} />
            )}
            <input type="number" value={form.price} onChange={e => set('price', e.target.value)} placeholder="NT$" style={{ flex: 1 }} />
          </div>
        </div>

        <div className="field">
          <label>店家</label>
          <input type="text" value={form.store} onChange={e => set('store', e.target.value)} placeholder="哪裡買的" />
        </div>

        <div className="field">
          <label>備註</label>
          <textarea value={form.notes} onChange={e => set('notes', e.target.value)} />
        </div>

        <div className="modal-actions">
          {item && <button className="btn btn-danger" onClick={() => onDelete(item.id)}>刪除</button>}
          <button className="btn btn-ghost" onClick={onClose}>取消</button>
          <button className="btn btn-primary" disabled={!form.name.trim()} onClick={() => onSave(form)}>儲存</button>
        </div>
      </div>
    </div>
  );
}

function SetColorsView({ item, onUpdateColors, onEditBox, onClose }) {
  const colors = item.colors || [];
  const [name, setName] = useState('');
  const [code, setCode] = useState('');
  const [hex, setHex] = useState('#C1432E');

  const addColor = () => {
    if (!name.trim()) return;
    const next = [...colors, { id: Date.now().toString(36) + Math.random().toString(36).slice(2, 6), name: name.trim(), code: code.trim(), colorHex: hex }];
    onUpdateColors(next);
    setName(''); setCode('');
  };

  const removeColor = (id) => {
    onUpdateColors(colors.filter(c => c.id !== id));
  };

  const updateColor = (id, patch) => {
    onUpdateColors(colors.map(c => c.id === id ? { ...c, ...patch } : c));
  };

  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal" onClick={e => e.stopPropagation()} style={{ maxHeight: '92vh' }}>
        <h2 className="display">{item.name}</h2>
        <div style={{ fontSize: 12.5, color: 'var(--ink-soft)', marginBottom: 14 }}>
          {item.brand}{item.brand ? ' · ' : ''}{colors.length} 色
          <span style={{ marginLeft: 10, textDecoration: 'underline', cursor: 'pointer' }} onClick={onEditBox}>編輯盒子基本資料</span>
        </div>

        <div className="field">
          <label>新增顏色</label>
          <div style={{ display: 'flex', gap: 8, alignItems: 'center' }}>
            <input type="color" value={hex} onChange={e => setHex(e.target.value)}
              style={{ width: 40, height: 40, borderRadius: 10, border: '1px solid var(--line)', padding: 2, flexShrink: 0 }} />
            <input type="text" value={name} onChange={e => setName(e.target.value)} placeholder="顏色名稱" style={{ flex: 2, padding: '10px 12px', borderRadius: 10, border: '1px solid var(--line)', background: 'var(--paper-raised)', color: 'var(--ink)', fontFamily: 'inherit', fontSize: 14 }} />
            <input type="text" value={code} onChange={e => setCode(e.target.value)} placeholder="編號" style={{ flex: 1, padding: '10px 12px', borderRadius: 10, border: '1px solid var(--line)', background: 'var(--paper-raised)', color: 'var(--ink)', fontFamily: 'inherit', fontSize: 14 }} />
          </div>
          <button className="btn btn-primary" style={{ marginTop: 8, width: '100%' }} disabled={!name.trim()} onClick={addColor}>+ 加入這支顏色</button>
        </div>

        <div style={{ display: 'flex', flexDirection: 'column', gap: 8, marginTop: 16 }}>
          {colors.length === 0 && (
            <div style={{ fontSize: 13, color: 'var(--ink-soft)', textAlign: 'center', padding: '20px 0' }}>
              還沒有加入任何顏色
            </div>
          )}
          {colors.map(c => (
            <div key={c.id} style={{ display: 'flex', alignItems: 'center', gap: 10, padding: '8px 4px', borderBottom: '1px solid var(--line)' }}>
              <input type="color" value={c.colorHex} onChange={e => updateColor(c.id, { colorHex: e.target.value })}
                style={{ width: 32, height: 32, borderRadius: 8, border: '1px solid var(--line)', padding: 1, flexShrink: 0 }} />
              <input type="text" value={c.name} onChange={e => updateColor(c.id, { name: e.target.value })}
                style={{ flex: 2, border: 'none', background: 'transparent', color: 'var(--ink)', fontFamily: 'inherit', fontSize: 14 }} />
              <input type="text" value={c.code || ''} onChange={e => updateColor(c.id, { code: e.target.value })}
                placeholder="編號" style={{ flex: 1, border: 'none', background: 'transparent', color: 'var(--ink-soft)', fontFamily: 'inherit', fontSize: 12.5 }} />
              <span onClick={() => removeColor(c.id)} style={{ flexShrink: 0, color: 'var(--vermilion)', fontSize: 13, cursor: 'pointer', padding: '4px 6px' }}>刪除</span>
            </div>
          ))}
        </div>

        <div className="modal-actions">
          <button className="btn btn-primary" style={{ flex: 1 }} onClick={onClose}>完成</button>
        </div>
      </div>
    </div>
  );
}

function hexToHSL(hex) {
  let r = 0, g = 0, b = 0;
  if (hex.length === 7) {
    r = parseInt(hex.slice(1, 3), 16) / 255;
    g = parseInt(hex.slice(3, 5), 16) / 255;
    b = parseInt(hex.slice(5, 7), 16) / 255;
  }
  const max = Math.max(r, g, b), min = Math.min(r, g, b);
  let h = 0, s = 0;
  const l = (max + min) / 2;
  const d = max - min;
  if (d !== 0) {
    s = d / (1 - Math.abs(2 * l - 1));
    switch (max) {
      case r: h = ((g - b) / d) % 6; break;
      case g: h = (b - r) / d + 2; break;
      case b: h = (r - g) / d + 4; break;
    }
    h *= 60;
    if (h < 0) h += 360;
  }
  return { h, s: s * 100, l: l * 100 };
}

const COLOR_FAMILIES = [
  { key: 'red', label: '紅', min: 345, max: 360 },
  { key: 'red2', label: '紅', min: 0, max: 15 },
  { key: 'orange', label: '橙', min: 15, max: 45 },
  { key: 'yellow', label: '黃', min: 45, max: 68 },
  { key: 'yellowgreen', label: '黃綠', min: 68, max: 95 },
  { key: 'green', label: '綠', min: 95, max: 155 },
  { key: 'teal', label: '藍綠', min: 155, max: 195 },
  { key: 'blue', label: '藍', min: 195, max: 255 },
  { key: 'purple', label: '紫', min: 255, max: 290 },
  { key: 'magenta', label: '桃紫', min: 290, max: 345 },
];

function getColorFamilyKey(hex) {
  if (!hex) return 'neutral';
  const { h, s, l } = hexToHSL(hex);
  if (s < 12) return 'neutral';
  const fam = COLOR_FAMILIES.find(f => h >= f.min && h < f.max);
  return fam ? (fam.key === 'red2' ? 'red' : fam.key) : 'neutral';
}

function ColorPaletteView({ items, onSelectItem }) {
  const swatches = [];
  for (const it of items) {
    if (it.status !== 'owned') continue;
    if (it.isSet) {
      for (const c of (it.colors || [])) {
        if (c.colorHex) swatches.push({ id: it.id + ':' + c.id, name: c.name, colorHex: c.colorHex, parent: it, isSetColor: true });
      }
    } else if (it.colorHex) {
      const useHex = it.writeColorHex || it.colorHex;
      swatches.push({ id: it.id, name: it.name, colorHex: useHex, parent: it, isSetColor: false });
    }
  }
  const order = ['red', 'orange', 'yellow', 'yellowgreen', 'green', 'teal', 'blue', 'purple', 'magenta', 'neutral'];
  const labels = { red: '紅', orange: '橙', yellow: '黃', yellowgreen: '黃綠', green: '綠', teal: '藍綠', blue: '藍', purple: '紫', magenta: '桃紫', neutral: '中性／黑白灰' };
  const groups = {};
  for (const sw of swatches) {
    const key = getColorFamilyKey(sw.colorHex);
    (groups[key] = groups[key] || []).push(sw);
  }
  for (const key of Object.keys(groups)) {
    groups[key].sort((a, b) => hexToHSL(b.colorHex).l - hexToHSL(a.colorHex).l);
  }
  const nonEmpty = order.filter(k => groups[k] && groups[k].length > 0);

  if (swatches.length === 0) {
    return (
      <div className="empty-state">
        <div className="display">還沒有顏色可以看</div>
        <div>先新增幾支已收藏的筆，這裡會自動排出色票</div>
      </div>
    );
  }

  return (
    <div>
      {nonEmpty.map(key => (
        <div key={key} style={{ marginBottom: 22 }}>
          <div style={{ fontSize: 13, fontWeight: 600, color: 'var(--ink-soft)', marginBottom: 8 }}>
            {labels[key]} <span className="mono" style={{ fontSize: 11, opacity: 0.7 }}>{groups[key].length}</span>
          </div>
          <div style={{ display: 'flex', gap: 8, overflowX: 'auto', paddingBottom: 4 }}>
            {groups[key].map(sw => (
              <div key={sw.id} onClick={() => onSelectItem(sw.parent)}
                style={{ flexShrink: 0, width: 52, cursor: 'pointer' }}>
                <div style={{
                  width: 52, height: 52, borderRadius: 10, background: sw.colorHex,
                  border: '1px solid var(--line)', boxShadow: 'var(--shadow)'
                }}></div>
                <div style={{
                  fontSize: 10.5, color: 'var(--ink-soft)', marginTop: 4,
                  overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap'
                }}>{sw.name}</div>
              </div>
            ))}
          </div>
        </div>
      ))}
    </div>
  );
}

function App() {
  const [dark, setDark] = useState(false);
  const [categories, setCategories] = useState([]);
  const [items, setItems] = useState([]);
  const [drawerOpen, setDrawerOpen] = useState(false);
  const [view, setView] = useState('list'); // list | palette
  const [selectedCat, setSelectedCat] = useState(null);
  const [statusFilter, setStatusFilter] = useState('all'); // all | owned | wishlist
  const [search, setSearch] = useState('');
  const [editingItem, setEditingItem] = useState(null);
  const [showItemForm, setShowItemForm] = useState(false);
  const [viewingSet, setViewingSet] = useState(null);
  const [showCatForm, setShowCatForm] = useState(false);
  const [catFormParent, setCatFormParent] = useState(null);
  const [editingCat, setEditingCat] = useState(null);
  const [actionCat, setActionCat] = useState(null);

  useEffect(() => {
    document.documentElement.classList.toggle('dark', dark);
  }, [dark]);

  useEffect(() => {
    getDoc(doc(db, 'settings', 'preferences')).then(snap => {
      if (snap.exists() && typeof snap.data().dark === 'boolean') setDark(snap.data().dark);
    }).catch(() => {});
  }, []);

  const toggleDark = () => {
    const next = !dark;
    setDark(next);
    setDoc(doc(db, 'settings', 'preferences'), { dark: next }, { merge: true }).catch(() => {});
  };

  useEffect(() => {
    const unsub = onSnapshot(collection(db, 'categories'), snap => {
      setCategories(snap.docs.map(d => ({ id: d.id, ...d.data() })));
    });
    return unsub;
  }, []);

  useEffect(() => {
    const q = query(collection(db, 'items'), orderBy('createdAt', 'desc'));
    const unsub = onSnapshot(q, snap => {
      setItems(snap.docs.map(d => ({ id: d.id, ...d.data() })));
    });
    return unsub;
  }, []);

  const itemCounts = useMemo(() => {
    const counts = {};
    for (const it of items) {
      counts[it.categoryId] = (counts[it.categoryId] || 0) + 1;
    }
    return counts;
  }, [items]);

  const rootCats = categories
    .filter(c => c.parentId === null || c.parentId === undefined)
    .sort((a, b) => (a.order ?? 0) - (b.order ?? 0));

  const visibleItems = useMemo(() => {
    let list = items;
    if (selectedCat) {
      const ids = new Set(collectDescendantIds(categories, selectedCat));
      list = list.filter(it => ids.has(it.categoryId));
    }
    if (statusFilter !== 'all') list = list.filter(it => it.status === statusFilter);
    if (search.trim()) {
      const s = search.trim().toLowerCase();
      list = list.filter(it =>
        (it.name || '').toLowerCase().includes(s) ||
        (it.brand || '').toLowerCase().includes(s) ||
        (it.store || '').toLowerCase().includes(s)
      );
    }
    return list;
  }, [items, selectedCat, statusFilter, search, categories]);

  const saveCategory = useCallback(async (data) => {
    try {
      const { id, ...rest } = data;
      const payload = { ...rest, parentId: rest.parentId || null };
      if (id) {
        await updateDoc(doc(db, 'categories', id), payload);
      } else {
        await addDoc(collection(db, 'categories'), { ...payload, order: Date.now() });
      }
      setShowCatForm(false);
      setEditingCat(null);
    } catch (err) {
      alert('分類儲存失敗：' + err.message);
    }
  }, []);

  const deleteCategory = useCallback(async (cat) => {
    const hasChildren = categories.some(c => c.parentId === cat.id);
    if (hasChildren) {
      alert('這個分類底下還有子分類，請先刪除或搬移子分類');
      return;
    }
    if (!confirm(`確定要刪除「${cat.name}」嗎？底下的項目會變成未分類。`)) return;
    try {
      const affected = items.filter(it => it.categoryId === cat.id);
      await Promise.all(affected.map(it => updateDoc(doc(db, 'items', it.id), { categoryId: null })));
      await deleteDoc(doc(db, 'categories', cat.id));
      if (selectedCat === cat.id) setSelectedCat(null);
      setShowCatForm(false);
      setEditingCat(null);
    } catch (err) {
      alert('刪除失敗：' + err.message);
    }
  }, [categories, items, selectedCat]);

  const moveCategory = useCallback(async (cat, direction) => {
    const siblings = categories
      .filter(c => (c.parentId || null) === (cat.parentId || null))
      .sort((a, b) => (a.order ?? 0) - (b.order ?? 0));
    const idx = siblings.findIndex(c => c.id === cat.id);
    const swapIdx = direction === 'up' ? idx - 1 : idx + 1;
    if (swapIdx < 0 || swapIdx >= siblings.length) return;
    const orders = siblings.map((c, i) => ({ id: c.id, order: i * 10 }));
    const tmp = orders[idx].order;
    orders[idx].order = orders[swapIdx].order;
    orders[swapIdx].order = tmp;
    try {
      await Promise.all(orders.map(o => updateDoc(doc(db, 'categories', o.id), { order: o.order })));
    } catch (err) {
      alert('排序失敗：' + err.message);
    }
  }, [categories]);

  const saveItem = useCallback(async (data) => {
    const { id, ...rest } = data;
    const payload = { ...rest, categoryId: rest.categoryId || null };
    try {
      if (id) {
        await updateDoc(doc(db, 'items', id), payload);
      } else {
        await addDoc(collection(db, 'items'), { ...payload, createdAt: serverTimestamp() });
      }
      setShowItemForm(false);
      setEditingItem(null);
    } catch (err) {
      alert('項目儲存失敗：' + err.message);
    }
  }, []);

  const deleteItem = useCallback(async (id) => {
    try {
      await deleteDoc(doc(db, 'items', id));
      setShowItemForm(false);
      setEditingItem(null);
    } catch (err) {
      alert('刪除失敗：' + err.message);
    }
  }, []);

  const openItem = useCallback((it) => {
    if (it.isSet) {
      setViewingSet(it);
    } else {
      setEditingItem(it);
      setShowItemForm(true);
    }
  }, []);

  const updateSetColors = useCallback(async (itemId, colors) => {
    try {
      await updateDoc(doc(db, 'items', itemId), { colors });
    } catch (err) {
      alert('顏色儲存失敗：' + err.message);
    }
  }, []);

  const catNameOf = (id) => categories.find(c => c.id === id)?.name || '未分類';

  return (
    <React.Fragment>
      <div className="topbar">
        <button className="icon-btn" onClick={() => setDrawerOpen(true)}>☰</button>
        <h1 className="display">筆藏</h1>
        <button className="icon-btn" onClick={() => setView(v => v === 'list' ? 'palette' : 'list')}>
          {view === 'palette' ? '☰' : '🎨'}
        </button>
        <button className="icon-btn" onClick={toggleDark}>{dark ? '☀' : '☾'}</button>
      </div>

      {view === 'list' && (
      <div className="search-row">
        <input className="search-input" placeholder="搜尋名稱、品牌、店家"
          value={search} onChange={e => setSearch(e.target.value)} />
        <div className={"chip" + (statusFilter === 'all' ? ' active' : '')} onClick={() => setStatusFilter('all')}>全部</div>
        <div className={"chip" + (statusFilter === 'owned' ? ' active' : '')} onClick={() => setStatusFilter('owned')}>已收藏</div>
        <div className={"chip" + (statusFilter === 'wishlist' ? ' active' : '')} onClick={() => setStatusFilter('wishlist')}>願望清單</div>
      </div>
      )}

      <div className="layout">
        <div className="main">
          {view === 'palette' ? (
            <ColorPaletteView items={items} onSelectItem={openItem} />
          ) : (
          <React.Fragment>
          {selectedCat && (
            <div style={{ marginBottom: 12, fontSize: 13, color: 'var(--ink-soft)' }}>
              篩選中：{catNameOf(selectedCat)}
              <span style={{ marginLeft: 8, cursor: 'pointer', textDecoration: 'underline' }}
                onClick={() => setSelectedCat(null)}>清除</span>
            </div>
          )}

          {visibleItems.length === 0 ? (
            <div className="empty-state">
              <div className="display">還沒有東西在這裡</div>
              <div>點右下角的 + 開始紀錄你的收藏吧</div>
            </div>
          ) : (
            <div className="grid">
              {visibleItems.map(it => (
                <div key={it.id}
                  className={"item-card" + (it.status === 'wishlist' ? ' wishlist' : '')}
                  onClick={() => openItem(it)}>
                  <div className="ink-stripe" style={{ background: it.colorHex || '#B9A98A' }}></div>
                  <div className="item-name">{it.name}</div>
                  {it.brand && <div className="item-meta">{it.brand}</div>}
                  {it.isSet && <div className="item-meta">{(it.colors || []).length} 色</div>}
                  {it.price && <div className="item-meta mono">NT$ {it.price}</div>}
                  {it.status === 'wishlist' && <div className="wishlist-tag">未入手</div>}
                </div>
              ))}
            </div>
          )}
          </React.Fragment>
          )}
        </div>
      </div>

      {drawerOpen && (
        <div className="drawer-overlay" onClick={() => setDrawerOpen(false)}>
          <div className="drawer" onClick={e => e.stopPropagation()}>
            <div className="drawer-header">
              <h2 className="display">分類</h2>
              <button className="icon-btn" onClick={() => setDrawerOpen(false)}>✕</button>
            </div>
            <div className={"cat-row" + (selectedCat === null ? " selected" : "")}
              onClick={() => { setSelectedCat(null); setDrawerOpen(false); }}>
              <span className="cat-swatch" style={{ background: '#8A8578' }}></span>
              <span className="cat-name">全部項目</span>
              <span className="cat-count">{items.length}</span>
            </div>
            {rootCats.map(cat => (
              <CategoryNode key={cat.id} cat={cat} categories={categories}
                itemCounts={itemCounts} selectedId={selectedCat}
                onSelect={(id) => { setSelectedCat(id); setDrawerOpen(false); }}
                onOpenActions={(cat) => setActionCat(cat)} />
            ))}
            <div className="cat-add-row" style={{ marginTop: 10 }}
              onClick={() => { setEditingCat(null); setCatFormParent(null); setShowCatForm(true); }}>
              + 新增頂層分類
            </div>
          </div>
        </div>
      )}

      <button className="fab" onClick={() => { setEditingItem(null); setShowItemForm(true); }}>+</button>

      {showItemForm && (
        <ItemForm item={editingItem} categories={categories}
          onSave={saveItem} onDelete={deleteItem}
          onClose={() => { setShowItemForm(false); setEditingItem(null); }} />
      )}

      {showCatForm && (
        <CategoryForm category={editingCat} initialParentId={catFormParent} categories={categories}
          onSave={saveCategory} onDelete={(cat) => deleteCategory(cat)}
          onClose={() => { setShowCatForm(false); setEditingCat(null); }} />
      )}

      {actionCat && (
        <div className="modal-overlay" onClick={() => setActionCat(null)}>
          <div className="modal" onClick={e => e.stopPropagation()} style={{ maxWidth: 360 }}>
            <h2 className="display">{actionCat.name}</h2>
            <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
              <button className="btn btn-ghost" onClick={() => { setEditingCat(null); setCatFormParent(actionCat.id); setShowCatForm(true); setActionCat(null); }}>+ 新增子分類</button>
              <button className="btn btn-ghost" onClick={() => { moveCategory(actionCat, 'up'); setActionCat(null); }}>↑ 上移</button>
              <button className="btn btn-ghost" onClick={() => { moveCategory(actionCat, 'down'); setActionCat(null); }}>↓ 下移</button>
              <button className="btn btn-ghost" onClick={() => { setEditingCat(actionCat); setCatFormParent(actionCat.parentId); setShowCatForm(true); setActionCat(null); }}>✎ 編輯</button>
              <button className="btn btn-danger" onClick={() => { deleteCategory(actionCat); setActionCat(null); }}>刪除</button>
            </div>
            <div className="modal-actions">
              <button className="btn btn-ghost" style={{ flex: 1 }} onClick={() => setActionCat(null)}>取消</button>
            </div>
          </div>
        </div>
      )}

      {viewingSet && (
        <SetColorsView
          item={items.find(it => it.id === viewingSet.id) || viewingSet}
          onUpdateColors={(colors) => updateSetColors(viewingSet.id, colors)}
          onEditBox={() => { setEditingItem(viewingSet); setShowItemForm(true); setViewingSet(null); }}
          onClose={() => setViewingSet(null)}
        />
      )}
    </React.Fragment>
  );
}

const root = createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
